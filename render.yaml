services:
  - type: web
    name: luxury-watches-backend
    env: node
    rootDir: backend
    buildCommand: pnpm install --no-frozen-lockfile && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: luxury-watches-frontend
    env: node
    rootDir: front
    buildCommand: pnpm install --no-frozen-lockfile && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
